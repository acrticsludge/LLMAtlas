name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: cd cli && npm ci

      - name: Lint
        run: cd cli && npm run lint 2>/dev/null || echo "No lint script"

      - name: Test
        run: cd cli && npm test

      - name: Build
        run: cd cli && npm run build

      - name: Publish to npm
        run: cd cli && npm publish
