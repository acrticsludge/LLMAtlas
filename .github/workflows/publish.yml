# LLMAtlas — npm Publish Workflow
#
# Two triggers:
# 1. Push a tag v* → runs tests, builds, publishes to npm
# 2. Push to main with a version bump in package.json → auto-creates tag
#
# Usage:
#   npm run release:patch   # 0.1.0 → 0.1.1 (auto-tags, push)
#   npm run release:minor   # 0.1.0 → 0.2.0
#   npm run release:major   # 0.1.0 → 1.0.0
#
# Or manually:
#   npm version patch
#   git push --tags
#
# Required GitHub secrets:
#   NPM_TOKEN — npm automation token (publish permission)

name: Publish

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  # ── Job 1: Test & Build ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  # ── Job 2: Auto-Tag (main branch only) ──────────────────
  auto-tag:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli

    outputs:
      new_version: ${{ steps.check_version.outputs.new_version }}
      is_major: ${{ steps.check_version.outputs.is_major }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Need full history + token to push tags back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version changed
        id: check_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1 || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "is_major=false" >> $GITHUB_OUTPUT
            echo "First release — will tag v$CURRENT_VERSION"
            exit 0
          fi

          TAG_VERSION=${LATEST_TAG#v}
          if [ "$CURRENT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version bumped: $TAG_VERSION → $CURRENT_VERSION"
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

            # Check if major
            CURRENT_MAJOR=${CURRENT_VERSION%%.*}
            TAG_MAJOR=${TAG_VERSION%%.*}
            if [ "$CURRENT_MAJOR" -gt "$TAG_MAJOR" ]; then
              echo "is_major=true" >> $GITHUB_OUTPUT
            else
              echo "is_major=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No version change"
            echo "new_version=" >> $GITHUB_OUTPUT
            echo "is_major=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check_version.outputs.new_version != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.check_version.outputs.new_version }}"
          git push origin "v${{ steps.check_version.outputs.new_version }}"

  # ── Job 3: Publish to npm (tag push or major auto-release) ──
  publish:
    if: |
      startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      # Need to run from root so setup-node's .npmrc is found,
      # but operate on the cli/ package
      - name: Install dependencies
        run: npm ci --prefix cli

      - name: Build
        run: npm run build --prefix cli

      - name: Publish to npm
        run: npm publish --prefix cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
